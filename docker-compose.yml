services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ecscanner
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: ecscanner
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecscanner -d ecscanner"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ecscanner_network

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ecscanner_network

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://ecscanner:secret@postgres:5432/ecscanner
      DATABASE_URL_SYNC: postgresql+psycopg2://ecscanner:secret@postgres:5432/ecscanner
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    networks:
      - ecscanner_network

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: celery -A src.tasks.celery_app worker --loglevel=info --concurrency=4 -Q discovery,assessment,enrichment
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://ecscanner:secret@postgres:5432/ecscanner
      DATABASE_URL_SYNC: postgresql+psycopg2://ecscanner:secret@postgres:5432/ecscanner
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    networks:
      - ecscanner_network

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: celery -A src.tasks.celery_app beat --loglevel=info --scheduler celery.beat.PersistentScheduler
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://ecscanner:secret@postgres:5432/ecscanner
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      - redis
    volumes:
      - .:/app
    networks:
      - ecscanner_network

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api
    networks:
      - ecscanner_network

volumes:
  postgres_data:
  redis_data:

networks:
  ecscanner_network:
    driver: bridge
